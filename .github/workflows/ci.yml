name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e '.[dev]' build

      - name: Check public documentation
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f README.zh-CN.md
          test -f PARITY.md
          test -f PARITY.zh-CN.md
          ! grep -n -E 'OPENLINKER_CORE_URL|OPENLINKER_RUNTIME_CERT([^_]|$)|OPENLINKER_RUNTIME_KEY([^_]|$)|OPENLINKER_RUNTIME_CA([^_]|$)' +            README.md README.zh-CN.md

      - name: Lint
        run: python -m ruff check .

      - name: Check bytecode compilation
        run: python -m compileall -q src

      - name: Test
        run: python -m pytest

      - name: Build distributions
        run: python -m build
