name: Bug report
description: Report a reproducible bug in openlinker-python.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, live tokens, private URLs, user data, or vulnerability details. Use SECURITY.md for security reports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible Python case.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK and Core versions
      description: SDK commit plus Core release or commit.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, operating system, and relevant transport or package extras.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove tokens, certificates, private URLs, and user data.
